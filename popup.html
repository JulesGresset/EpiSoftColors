<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>EpiSoftColors</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>EpiSoftColors</h1>
  <p>Personnalise les teintes douces appliquées sur les intras Epitech.</p>
  <div id="colors"></div>

  <h2>Planning</h2>
  <div class="slider-row">
    <input type="range" id="planning-saturation" min="0" max="100" />
    <span id="planning-saturation-value"></span>
  </div>

  <button id="reset">Réinitialiser les couleurs par défaut</button>
  <script src="colors.js"></script>
  <script src="popup.js"></script>
</body>
</html>
